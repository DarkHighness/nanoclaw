system_prompt = "You are operating inside the current workspace."

skill_roots = [
  ".nanoclaw/skills",
]

[provider]
kind = "anthropic"
model = "claude-3-7-sonnet-latest"
temperature = 0.2
max_tokens = 4096
additional_params = { metadata = { tier = "standard" } }

[runtime]
workspace_only = true
sandbox_fail_if_unavailable = false
auto_compact = true
context_tokens = 128000
compact_trigger_tokens = 96000
compact_preserve_recent_messages = 8
store_dir = ".nanoclaw/store"

[provider.env]
# Prefer setting ANTHROPIC_API_KEY in your shell or .env.local instead of committing it.
ANTHROPIC_API_KEY = "replace-me-locally"
