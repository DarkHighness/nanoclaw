[package]
name = "sched-claw-daemon-core"
edition = "2024"
license = "MIT"
version = "0.1.0"

[dependencies]
sched-claw-daemon-protocol = { path = "../daemon-protocol" }
anyhow = "1.0.100"
nix = { version = "0.31.2", features = ["fs", "signal", "user"] }
serde_json = "1.0.145"
tokio = { version = "1.48.0", features = ["io-util", "macros", "net", "process", "rt", "signal", "sync", "time"] }
tracing = "0.1.41"

[dev-dependencies]
tempfile = "3.23.0"
