# Keep local build/test CPU usage bounded by default. Developers can still
# override these locally because `force = false` preserves explicit shell
# values and Cargo lets explicit `-j` / `CARGO_BUILD_JOBS` win for builds.
[build]
jobs = 1

[env]
RUST_TEST_THREADS = { value = "1", force = false }
RAYON_NUM_THREADS = { value = "1", force = false }
TOKIO_WORKER_THREADS = { value = "1", force = false }
NANOCLAW_TEST_MAX_BLOCKING_THREADS = { value = "1", force = false }
